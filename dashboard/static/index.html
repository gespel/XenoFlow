<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>XenoFlow Dashboard</title>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap");

			:root {
				--bg-0: #f2f6f8;
				--bg-1: #e3ecf0;
				--surface: rgba(255, 255, 255, 0.72);
				--surface-strong: rgba(255, 255, 255, 0.9);
				--ink: #0e2b36;
				--muted: #4a6874;
				--ok: #1b9c78;
				--warn: #d68b00;
				--danger: #d94d4d;
				--line: rgba(14, 43, 54, 0.12);
				--accent: #0b8cb0;
				--accent-soft: #9be2ff;
				--radius: 18px;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: "Space Grotesk", sans-serif;
				color: var(--ink);
				background:
					radial-gradient(circle at 20% 10%, #ffffff 0%, transparent 35%),
					radial-gradient(circle at 88% 22%, #c5e8f5 0%, transparent 28%),
					linear-gradient(145deg, var(--bg-0), var(--bg-1));
			}

			.layout {
				width: min(1200px, 94vw);
				margin: 22px auto 30px;
				display: grid;
				gap: 16px;
			}

			.hero {
				border: 1px solid var(--line);
				border-radius: calc(var(--radius) + 4px);
				background: linear-gradient(
					110deg,
					rgba(255, 255, 255, 0.88),
					rgba(209, 237, 247, 0.75)
				);
				box-shadow: 0 18px 40px rgba(9, 38, 50, 0.12);
				padding: 22px 24px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
			}

			.hero h1 {
				margin: 0 0 6px;
				font-size: clamp(1.4rem, 2.3vw, 2rem);
				line-height: 1.15;
			}

			.hero p {
				margin: 0;
				color: var(--muted);
			}

			.status-chip {
				font-family: "IBM Plex Mono", monospace;
				font-size: 0.82rem;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				padding: 9px 12px;
				border-radius: 999px;
				border: 1px solid rgba(14, 43, 54, 0.16);
				background: var(--surface-strong);
			}

			.grid {
				display: grid;
				gap: 16px;
				grid-template-columns: repeat(12, 1fr);
			}

			.card {
				border: 1px solid var(--line);
				border-radius: var(--radius);
				background: var(--surface);
				backdrop-filter: blur(6px);
				box-shadow: 0 12px 22px rgba(12, 38, 50, 0.08);
				padding: 16px;
			}

			.kpi {
				grid-column: span 3;
			}

			.kpi .label {
				color: var(--muted);
				font-size: 0.9rem;
			}

			.kpi .value {
				margin-top: 8px;
				font-size: clamp(1.4rem, 2vw, 1.9rem);
				font-weight: 700;
			}

			.chart {
				grid-column: span 8;
			}

			.events {
				grid-column: span 4;
			}

			h2 {
				margin: 0 0 12px;
				font-size: 1rem;
				text-transform: uppercase;
				letter-spacing: 0.07em;
			}

			canvas {
				width: 100%;
				height: 260px;
				display: block;
			}

			.list {
				display: grid;
				gap: 8px;
			}

			.item {
				border: 1px solid var(--line);
				border-radius: 12px;
				padding: 10px;
				background: rgba(255, 255, 255, 0.6);
			}

			.item-top {
				display: flex;
				justify-content: space-between;
				gap: 8px;
				font-family: "IBM Plex Mono", monospace;
				font-size: 0.8rem;
			}

			.item p {
				margin: 6px 0 0;
				font-size: 0.9rem;
			}

			.ok {
				color: var(--ok);
			}

			.warn {
				color: var(--warn);
			}

			.danger {
				color: var(--danger);
			}

			.pulse {
				animation: pulse 2.2s infinite;
			}

			.fade-in {
				opacity: 0;
				transform: translateY(10px);
				animation: enter 0.55s ease forwards;
			}

			.fade-in:nth-child(1) { animation-delay: 0.05s; }
			.fade-in:nth-child(2) { animation-delay: 0.11s; }
			.fade-in:nth-child(3) { animation-delay: 0.16s; }
			.fade-in:nth-child(4) { animation-delay: 0.22s; }

			@keyframes pulse {
				0%, 100% { box-shadow: 0 0 0 0 rgba(11, 140, 176, 0.24); }
				70% { box-shadow: 0 0 0 12px rgba(11, 140, 176, 0); }
			}

			@keyframes enter {
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@media (max-width: 980px) {
				.kpi {
					grid-column: span 6;
				}

				.chart,
				.events {
					grid-column: span 12;
				}
			}

			@media (max-width: 620px) {
				.hero {
					flex-direction: column;
					align-items: flex-start;
				}

				.kpi {
					grid-column: span 12;
				}
			}
		</style>
	</head>
	<body>
		<main class="layout">
			<section class="hero fade-in">
				<div>
					<h1>XenoFlow Dashboard</h1>
					<p>Current Status</p>
				</div>
				<div id="system-state" class="status-chip pulse">System: Verbinde...</div>
			</section>

			<section class="grid">
				<article class="card kpi fade-in">
					<div class="label">Aktive Flows</div>
					<div id="kpi-flows" class="value">-</div>
				</article>

				<article class="card kpi fade-in">
					<div class="label">Pakete/s</div>
					<div id="kpi-pps" class="value">-</div>
				</article>

				<article class="card kpi fade-in">
					<div class="label">Drop-Rate</div>
					<div id="kpi-drops" class="value">-</div>
				</article>

				<article class="card kpi fade-in">
					<div class="label">Backend RTT</div>
					<div id="kpi-rtt" class="value">-</div>
				</article>

				<article class="card chart fade-in">
					<h2>Traffic Verlauf</h2>
					<canvas id="traffic-chart" width="800" height="260"></canvas>
				</article>

				<article class="card events fade-in">
					<h2>Letzte Events</h2>
					<div id="events" class="list"></div>
				</article>
			</section>
		</main>

		<script>
			// Diese URL ersetzt du später durch dein bestehendes Backend.
			const METRICS_ENDPOINT = "/api/dashboard/metrics";
			const EVENTS_ENDPOINT = "/api/dashboard/events";

			const chartCanvas = document.getElementById("traffic-chart");
			const chartCtx = chartCanvas.getContext("2d");

			const stateEl = document.getElementById("system-state");
			const flowsEl = document.getElementById("kpi-flows");
			const ppsEl = document.getElementById("kpi-pps");
			const dropsEl = document.getElementById("kpi-drops");
			const rttEl = document.getElementById("kpi-rtt");
			const eventsEl = document.getElementById("events");

			let chartPoints = Array.from({ length: 24 }, () => 0);

			function formatInt(value) {
				return Number(value || 0).toLocaleString("de-DE");
			}

			function drawChart(points) {
				const { width, height } = chartCanvas;
				chartCtx.clearRect(0, 0, width, height);

				chartCtx.strokeStyle = "rgba(14, 43, 54, 0.2)";
				chartCtx.lineWidth = 1;
				for (let i = 1; i <= 4; i++) {
					const y = (height / 5) * i;
					chartCtx.beginPath();
					chartCtx.moveTo(0, y);
					chartCtx.lineTo(width, y);
					chartCtx.stroke();
				}

				const max = Math.max(...points, 1);
				const xStep = width / (points.length - 1);

				chartCtx.beginPath();
				points.forEach((point, idx) => {
					const x = idx * xStep;
					const y = height - (point / max) * (height - 20) - 10;
					if (idx === 0) {
						chartCtx.moveTo(x, y);
					} else {
						chartCtx.lineTo(x, y);
					}
				});
				chartCtx.lineWidth = 3;
				chartCtx.strokeStyle = "#0b8cb0";
				chartCtx.stroke();

				chartCtx.lineTo(width, height);
				chartCtx.lineTo(0, height);
				chartCtx.closePath();
				const gradient = chartCtx.createLinearGradient(0, 0, 0, height);
				gradient.addColorStop(0, "rgba(11, 140, 176, 0.35)");
				gradient.addColorStop(1, "rgba(11, 140, 176, 0)");
				chartCtx.fillStyle = gradient;
				chartCtx.fill();
			}

			function renderEvents(events) {
				eventsEl.innerHTML = "";
				events.slice(0, 8).forEach((event) => {
					const div = document.createElement("div");
					div.className = "item";
					div.innerHTML = `
						<div class="item-top">
							<span>${event.time}</span>
							<span class="${event.level}">${event.level.toUpperCase()}</span>
						</div>
						<p>${event.message}</p>
					`;
					eventsEl.appendChild(div);
				});
			}

			async function loadData() {
				try {
					const [metricsResp, eventsResp] = await Promise.all([
						fetch(METRICS_ENDPOINT),
						fetch(EVENTS_ENDPOINT),
					]);

					if (!metricsResp.ok || !eventsResp.ok) {
						throw new Error("Backend antwortet nicht wie erwartet");
					}

					const metrics = await metricsResp.json();
					const events = await eventsResp.json();

					stateEl.textContent = "System: Online";
					flowsEl.textContent = formatInt(metrics.active_flows);
					ppsEl.textContent = `${formatInt(metrics.packets_per_second)} pps`;
					dropsEl.textContent = `${metrics.drop_rate_percent?.toFixed?.(2) ?? "0.00"} %`;
					rttEl.textContent = `${metrics.backend_rtt_ms ?? "-"} ms`;

					chartPoints = Array.isArray(metrics.traffic_series)
						? metrics.traffic_series.slice(-24)
						: chartPoints;
					drawChart(chartPoints);
					renderEvents(Array.isArray(events) ? events : []);
				} catch (_) {
					// Frontend-only Fallback, damit die UI ohne Backend nutzbar bleibt.
					stateEl.textContent = "System: Demo-Modus";
					const seed = Math.floor(Date.now() / 1000);
					const fake = chartPoints.map((_, i) =>
						Math.max(0, Math.round(1700 + 350 * Math.sin((seed + i) / 4)))
					);

					flowsEl.textContent = formatInt(128 + (seed % 9));
					ppsEl.textContent = `${formatInt(fake[fake.length - 1])} pps`;
					dropsEl.textContent = `${((seed % 7) / 10).toFixed(2)} %`;
					rttEl.textContent = `${2 + (seed % 6)} ms`;

					chartPoints = fake;
					drawChart(chartPoints);
					renderEvents([
						{ time: "Jetzt", level: "warn", message: "Keine API-Verbindung, Demo-Daten aktiv." },
						{ time: "-10s", level: "ok", message: "Frontend erfolgreich initialisiert." },
						{ time: "-30s", level: "ok", message: "Warte auf Backend-Endpunkte." },
					]);
				}
			}

			loadData();
			setInterval(loadData, 5000);
		</script>
	</body>
</html>
