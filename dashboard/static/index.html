<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>XenoFlow Dashboard</title>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

			:root {
				--bg: #f5f7fa;
				--surface: #ffffff;
				--border: #d0d7de;
				--text: #1f2937;
				--text-muted: #6b7280;
				--accent: #2563eb;
				--success: #059669;
				--danger: #dc2626;
				--radius: 8px;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: "Inter", sans-serif;
				color: var(--text);
				background: var(--bg);
			}

			.layout {
				width: min(1200px, 96vw);
				margin: 20px auto;
				display: grid;
				gap: 20px;
			}

			.hero {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				padding: 24px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
			}

			.hero h1 {
				margin: 0 0 4px;
				font-size: 1.5rem;
				line-height: 1.2;
			}

			.hero p {
				margin: 0;
				color: var(--text-muted);
				font-size: 0.9rem;
			}

			.status-chip {
				font-family: monospace;
				font-size: 0.85rem;
				padding: 8px 12px;
				border-radius: 4px;
				border: 1px solid var(--border);
				background: #f3f4f6;
				white-space: nowrap;
			}

			.grid {
				display: grid;
				gap: 20px;
				grid-template-columns: repeat(12, 1fr);
			}

			.card {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				padding: 20px;
			}

			.kpi {
				grid-column: span 3;
			}

			.kpi .label {
				color: var(--text-muted);
				font-size: 0.85rem;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}

			.kpi .value {
				margin-top: 8px;
				font-size: 1.75rem;
				font-weight: 700;
				color: var(--text);
			}

			.chart {
				grid-column: span 12;
			}

			.chart h2 {
				margin: 0 0 16px;
				font-size: 1rem;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: var(--text-muted);
			}

			canvas {
				width: 100%;
				height: 260px;
				display: block;
			}

			@media (max-width: 980px) {
				.kpi {
					grid-column: span 6;
				}

				.chart {
					grid-column: span 12;
				}
			}

			@media (max-width: 620px) {
				.hero {
					flex-direction: column;
					align-items: flex-start;
				}

				.kpi {
					grid-column: span 12;
				}
			}
		</style>
	</head>
	<body>
		<main class="layout">
			<section class="hero">
				<div>
					<h1>XenoFlow Dashboard</h1>
					<p>System Monitoring</p>
				</div>
				<div id="system-state" class="status-chip">System: Connecting...</div>
			</section>

			<section class="grid">
				<article class="card kpi">
					<div class="label">Active Backends</div>
					<div id="kpi-backends" class="value">-</div>
				</article>

				<article class="card kpi">
					<div class="label">Packets/s</div>
					<div id="kpi-pps" class="value">-</div>
				</article>

				<article class="card kpi">
					<div class="label">Drop Rate</div>
					<div id="kpi-drops" class="value">-</div>
				</article>

				<article class="card kpi">
					<div class="label">Backend RTT</div>
					<div id="kpi-rtt" class="value">-</div>
				</article>

				<article class="card chart">
					<h2>Traffic Trend</h2>
					<canvas id="traffic-chart" width="800" height="260"></canvas>
				</article>
			</section>
		</main>

		<script>
			// Replace these URLs with your backend endpoints.
			const METRICS_ENDPOINT = "/api";

			const chartCanvas = document.getElementById("traffic-chart");
			const chartCtx = chartCanvas.getContext("2d");

			const stateEl = document.getElementById("system-state");
			const backendsEl = document.getElementById("kpi-backends");
			const ppsEl = document.getElementById("kpi-pps");
			const dropsEl = document.getElementById("kpi-drops");
			const rttEl = document.getElementById("kpi-rtt");

			let chartPoints = Array.from({ length: 24 }, () => 0);

			function formatInt(value) {
				return Number(value || 0).toLocaleString("en-US");
			}

			function drawChart(points) {
				const { width, height } = chartCanvas;
				chartCtx.clearRect(0, 0, width, height);

				chartCtx.strokeStyle = "rgba(167, 201, 226, 0.22)";
				chartCtx.lineWidth = 1;
				for (let i = 1; i <= 4; i++) {
					const y = (height / 5) * i;
					chartCtx.beginPath();
					chartCtx.moveTo(0, y);
					chartCtx.lineTo(width, y);
					chartCtx.stroke();
				}

				const max = Math.max(...points, 1);
				const xStep = width / (points.length - 1);

				chartCtx.beginPath();
				points.forEach((point, idx) => {
					const x = idx * xStep;
					const y = height - (point / max) * (height - 20) - 10;
					if (idx === 0) {
						chartCtx.moveTo(x, y);
					} else {
						chartCtx.lineTo(x, y);
					}
				});
				chartCtx.lineWidth = 3;
				chartCtx.strokeStyle = "#38c5f3";
				chartCtx.stroke();

				chartCtx.lineTo(width, height);
				chartCtx.lineTo(0, height);
				chartCtx.closePath();
				const gradient = chartCtx.createLinearGradient(0, 0, 0, height);
				gradient.addColorStop(0, "rgba(56, 197, 243, 0.38)");
				gradient.addColorStop(1, "rgba(56, 197, 243, 0)");
				chartCtx.fillStyle = gradient;
				chartCtx.fill();
			}

			async function loadData() {
				try {
					const metricsResp = await fetch(METRICS_ENDPOINT);

					if (!metricsResp.ok) {
						throw new Error("Backend did not return the expected response");
					}

					const metrics = await metricsResp.json();

					stateEl.textContent = "System: Online";
					backendsEl.textContent = formatInt(metrics.num_backends);
					ppsEl.textContent = `${formatInt(metrics.packets_per_second)} pps`;
					dropsEl.textContent = `${metrics.drop_rate_percent?.toFixed?.(2) ?? "0.00"} %`;
					rttEl.textContent = `${metrics.backend_rtt_ms ?? "-"} ms`;

					chartPoints = Array.isArray(metrics.traffic_series)
						? metrics.traffic_series.slice(-24)
						: chartPoints;
					drawChart(chartPoints);
				} catch (_) {
					// Frontend-only fallback so the UI still works without a backend.
					stateEl.textContent = "System: Demo Mode";
					const seed = Math.floor(Date.now() / 1000);
					const fake = chartPoints.map((_, i) =>
						Math.max(0, Math.round(1700 + 350 * Math.sin((seed + i) / 4)))
					);

					backendsEl.textContent = formatInt(128 + (seed % 9));
					ppsEl.textContent = `${formatInt(fake[fake.length - 1])} pps`;
					dropsEl.textContent = `${((seed % 7) / 10).toFixed(2)} %`;
					rttEl.textContent = `${2 + (seed % 6)} ms`;

					chartPoints = fake;
					drawChart(chartPoints);
				}
			}

			loadData();
			setInterval(loadData, 5000);
		</script>
	</body>
</html>
