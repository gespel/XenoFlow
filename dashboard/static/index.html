<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>XenoFlow Dashboard</title>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap");

			:root {
				--bg-0: #070d13;
				--bg-1: #111d2b;
				--surface: rgba(20, 31, 45, 0.72);
				--surface-strong: rgba(25, 38, 54, 0.92);
				--ink: #e7f2ff;
				--muted: #94adc4;
				--ok: #49d7a6;
				--warn: #ffb347;
				--danger: #ff7272;
				--line: rgba(167, 201, 226, 0.2);
				--accent: #38c5f3;
				--accent-soft: #8adfff;
				--radius: 18px;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: "Space Grotesk", sans-serif;
				color: var(--ink);
				background:
					radial-gradient(circle at 16% 10%, #12364b 0%, transparent 34%),
					radial-gradient(circle at 86% 18%, #2f1842 0%, transparent 30%),
					linear-gradient(145deg, var(--bg-0), var(--bg-1));
			}

			.layout {
				width: min(1200px, 94vw);
				margin: 22px auto 30px;
				display: grid;
				gap: 16px;
			}

			.hero {
				border: 1px solid var(--line);
				border-radius: calc(var(--radius) + 4px);
				background: linear-gradient(
					110deg,
					rgba(27, 42, 60, 0.92),
					rgba(19, 71, 92, 0.75)
				);
				box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
				padding: 22px 24px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
			}

			.hero h1 {
				margin: 0 0 6px;
				font-size: clamp(1.4rem, 2.3vw, 2rem);
				line-height: 1.15;
			}

			.hero p {
				margin: 0;
				color: var(--muted);
			}

			.status-chip {
				font-family: "IBM Plex Mono", monospace;
				font-size: 0.82rem;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				padding: 9px 12px;
				border-radius: 999px;
				border: 1px solid rgba(167, 201, 226, 0.24);
				background: var(--surface-strong);
			}

			.grid {
				display: grid;
				gap: 16px;
				grid-template-columns: repeat(12, 1fr);
			}

			.card {
				border: 1px solid var(--line);
				border-radius: var(--radius);
				background: var(--surface);
				backdrop-filter: blur(6px);
				box-shadow: 0 12px 22px rgba(0, 0, 0, 0.28);
				padding: 16px;
			}

			.kpi {
				grid-column: span 3;
			}

			.kpi .label {
				color: var(--muted);
				font-size: 0.9rem;
			}

			.kpi .value {
				margin-top: 8px;
				font-size: clamp(1.4rem, 2vw, 1.9rem);
				font-weight: 700;
			}

			.chart {
				grid-column: span 12;
			}

			h2 {
				margin: 0 0 12px;
				font-size: 1rem;
				text-transform: uppercase;
				letter-spacing: 0.07em;
			}

			canvas {
				width: 100%;
				height: 260px;
				display: block;
			}

			.pulse {
				animation: pulse 2.2s infinite;
			}

			.fade-in {
				opacity: 0;
				transform: translateY(10px);
				animation: enter 0.55s ease forwards;
			}

			.fade-in:nth-child(1) { animation-delay: 0.05s; }
			.fade-in:nth-child(2) { animation-delay: 0.11s; }
			.fade-in:nth-child(3) { animation-delay: 0.16s; }
			.fade-in:nth-child(4) { animation-delay: 0.22s; }

			@keyframes pulse {
				0%, 100% { box-shadow: 0 0 0 0 rgba(56, 197, 243, 0.26); }
				70% { box-shadow: 0 0 0 12px rgba(56, 197, 243, 0); }
			}

			@keyframes enter {
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@media (max-width: 980px) {
				.kpi {
					grid-column: span 6;
				}

				.chart {
					grid-column: span 12;
				}
			}

			@media (max-width: 620px) {
				.hero {
					flex-direction: column;
					align-items: flex-start;
				}

				.kpi {
					grid-column: span 12;
				}
			}
		</style>
	</head>
	<body>
		<main class="layout">
			<section class="hero fade-in">
				<div>
					<h1>XenoFlow Dashboard</h1>
					<p>Current Status</p>
				</div>
				<div id="system-state" class="status-chip pulse">System: Connecting...</div>
			</section>

			<section class="grid">
				<article class="card kpi fade-in">
					<div class="label">Active Flows</div>
					<div id="kpi-flows" class="value">-</div>
				</article>

				<article class="card kpi fade-in">
					<div class="label">Packets/s</div>
					<div id="kpi-pps" class="value">-</div>
				</article>

				<article class="card kpi fade-in">
					<div class="label">Drop Rate</div>
					<div id="kpi-drops" class="value">-</div>
				</article>

				<article class="card kpi fade-in">
					<div class="label">Backend RTT</div>
					<div id="kpi-rtt" class="value">-</div>
				</article>

				<article class="card chart fade-in">
					<h2>Traffic Trend</h2>
					<canvas id="traffic-chart" width="800" height="260"></canvas>
				</article>
			</section>
		</main>

		<script>
			// Replace these URLs with your backend endpoints.
			const METRICS_ENDPOINT = "/api";

			const chartCanvas = document.getElementById("traffic-chart");
			const chartCtx = chartCanvas.getContext("2d");

			const stateEl = document.getElementById("system-state");
			const flowsEl = document.getElementById("kpi-flows");
			const ppsEl = document.getElementById("kpi-pps");
			const dropsEl = document.getElementById("kpi-drops");
			const rttEl = document.getElementById("kpi-rtt");

			let chartPoints = Array.from({ length: 24 }, () => 0);

			function formatInt(value) {
				return Number(value || 0).toLocaleString("en-US");
			}

			function drawChart(points) {
				const { width, height } = chartCanvas;
				chartCtx.clearRect(0, 0, width, height);

				chartCtx.strokeStyle = "rgba(167, 201, 226, 0.22)";
				chartCtx.lineWidth = 1;
				for (let i = 1; i <= 4; i++) {
					const y = (height / 5) * i;
					chartCtx.beginPath();
					chartCtx.moveTo(0, y);
					chartCtx.lineTo(width, y);
					chartCtx.stroke();
				}

				const max = Math.max(...points, 1);
				const xStep = width / (points.length - 1);

				chartCtx.beginPath();
				points.forEach((point, idx) => {
					const x = idx * xStep;
					const y = height - (point / max) * (height - 20) - 10;
					if (idx === 0) {
						chartCtx.moveTo(x, y);
					} else {
						chartCtx.lineTo(x, y);
					}
				});
				chartCtx.lineWidth = 3;
				chartCtx.strokeStyle = "#38c5f3";
				chartCtx.stroke();

				chartCtx.lineTo(width, height);
				chartCtx.lineTo(0, height);
				chartCtx.closePath();
				const gradient = chartCtx.createLinearGradient(0, 0, 0, height);
				gradient.addColorStop(0, "rgba(56, 197, 243, 0.38)");
				gradient.addColorStop(1, "rgba(56, 197, 243, 0)");
				chartCtx.fillStyle = gradient;
				chartCtx.fill();
			}

			async function loadData() {
				try {
					const metricsResp = await fetch(METRICS_ENDPOINT);

					if (!metricsResp.ok) {
						throw new Error("Backend did not return the expected response");
					}

					const metrics = await metricsResp.json();

					stateEl.textContent = "System: Online";
					flowsEl.textContent = formatInt(metrics.active_flows);
					ppsEl.textContent = `${formatInt(metrics.packets_per_second)} pps`;
					dropsEl.textContent = `${metrics.drop_rate_percent?.toFixed?.(2) ?? "0.00"} %`;
					rttEl.textContent = `${metrics.backend_rtt_ms ?? "-"} ms`;

					chartPoints = Array.isArray(metrics.traffic_series)
						? metrics.traffic_series.slice(-24)
						: chartPoints;
					drawChart(chartPoints);
				} catch (_) {
					// Frontend-only fallback so the UI still works without a backend.
					stateEl.textContent = "System: Demo Mode";
					const seed = Math.floor(Date.now() / 1000);
					const fake = chartPoints.map((_, i) =>
						Math.max(0, Math.round(1700 + 350 * Math.sin((seed + i) / 4)))
					);

					flowsEl.textContent = formatInt(128 + (seed % 9));
					ppsEl.textContent = `${formatInt(fake[fake.length - 1])} pps`;
					dropsEl.textContent = `${((seed % 7) / 10).toFixed(2)} %`;
					rttEl.textContent = `${2 + (seed % 6)} ms`;

					chartPoints = fake;
					drawChart(chartPoints);
				}
			}

			loadData();
			setInterval(loadData, 5000);
		</script>
	</body>
</html>
